---
- name: Create benches directory
  file:
    path: /home/frappe/benches
    state: directory
    owner: frappe
    group: frappe
    mode: "0755"

- name: Initialize Bench
  become: yes
  become_user: frappe
  shell: |
    export PATH=/home/frappe/.local/bin:$PATH
    /home/frappe/.local/bin/bench init \
      --python /usr/bin/python3.14 \
      /home/frappe/benches/deadman
  args:
    creates: /home/frappe/benches/deadman/Procfile

- name: Configure MariaDB socket
  become: yes
  become_user: frappe
  command: >
    /home/frappe/.local/bin/bench
    set-config -g
    db_socket
    /run/mysqld/mysqld.sock
  args:
    chdir: /home/frappe/benches/deadman
  environment:
    PATH: "/home/frappe/.local/bin:{{ ansible_env.PATH }}"

- name: Create site
  become: yes
  become_user: frappe
  command: >
    /home/frappe/.local/bin/bench new-site
    --db-root-username root
    --mariadb-root-password {{ mariadb_root_password }}
    --admin-password {{ admin_password }}
    {{ server }}
  args:
    chdir: /home/frappe/benches/deadman
    creates: /home/frappe/benches/deadman/sites/{{ server }}/site_config.json
  environment:
    PATH: "/home/frappe/.local/bin:{{ ansible_env.PATH }}"

- name: Get Deadman app
  become: yes
  become_user: frappe
  command: >
    /home/frappe/.local/bin/bench get-app
    {{ deadman_repo | default('https://github.com/20vikash/deadman') }}
  args:
    chdir: /home/frappe/benches/deadman
    creates: /home/frappe/benches/deadman/apps/deadman
  environment:
    PATH: "/home/frappe/.local/bin:{{ ansible_env.PATH }}"

- name: Ensure frappe exists in apps.txt
  lineinfile:
    path: /home/frappe/benches/deadman/sites/apps.txt
    line: frappe
    create: yes

- name: Ensure deadman exists in apps.txt
  lineinfile:
    path: /home/frappe/benches/deadman/sites/apps.txt
    line: deadman
    create: yes

- name: Install Deadman
  become: yes
  become_user: frappe
  command: >
    /home/frappe/.local/bin/bench
    --site {{ server }}
    install-app deadman
  args:
    chdir: /home/frappe/benches/deadman
  environment:
    PATH: "/home/frappe/.local/bin:{{ ansible_env.PATH }}"

# IMPORTANT: RUN AS ROOT
- name: Setup production
  become: yes
  become_user: root
  command: >
    /home/frappe/.local/bin/bench setup production frappe --yes
  args:
    chdir: /home/frappe/benches/deadman
  environment:
    PATH: "/home/frappe/.local/bin:{{ ansible_env.PATH }}"

- name: Install supervisor config
  become: yes
  copy:
    src: /home/frappe/benches/deadman/config/supervisor.conf
    dest: /etc/supervisor/conf.d/deadman.conf
    remote_src: yes

- name: Restart supervisor
  service:
    name: supervisor
    state: restarted

- name: Reload supervisor config
  shell: |
    supervisorctl reread
    supervisorctl update

- name: Create SSL directory
  file:
    path: /etc/nginx/ssl
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Write TLS certificate
  copy:
    content: "{{ certificate_full_chain }}"
    dest: "/etc/nginx/ssl/{{ domain }}.crt"
    owner: root
    group: root
    mode: "0600"

- name: Write TLS private key
  copy:
    content: "{{ certificate_private_key }}"
    dest: "/etc/nginx/ssl/{{ domain }}.key"
    owner: root
    group: root
    mode: "0600"

- name: Add SSL to Bench nginx config
  become: yes
  replace:
    path: /etc/nginx/conf.d/deadman.conf
    regexp: 'listen \[::\]:80;'
    replace: |
      listen [::]:80;

              listen 443 ssl http2;
              listen [::]:443 ssl http2;

              ssl_certificate /etc/nginx/ssl/{{ domain }}.crt;
              ssl_certificate_key /etc/nginx/ssl/{{ domain }}.key;

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  ignore_errors: true

- name: Validate nginx configuration
  command: nginx -t
  changed_when: false

- name: Reload nginx
  service:
    name: nginx
    state: reloaded

- name: Wait for Redis Queue
  wait_for:
    host: 127.0.0.1
    port: 11000
    timeout: 60

- name: Wait for Redis Cache
  wait_for:
    host: 127.0.0.1
    port: 13000
    timeout: 60

- name: Enable scheduler
  become: yes
  become_user: frappe
  command: >
    /home/frappe/.local/bin/bench
    --site {{ server }}
    enable-scheduler
  args:
    chdir: /home/frappe/benches/deadman
  environment:
    PATH: "/home/frappe/.local/bin:{{ ansible_env.PATH }}"

- name: Migrate site
  become: yes
  become_user: frappe
  command: >
    /home/frappe/.local/bin/bench
    --site {{ server }}
    migrate
  args:
    chdir: /home/frappe/benches/deadman
  environment:
    PATH: "/home/frappe/.local/bin:{{ ansible_env.PATH }}"

- name: Initialize Deadman secret
  become: yes
  become_user: frappe
  command: >
    /home/frappe/.local/bin/bench
    --site {{ server }}
    execute deadman.setup.initialize_deadman
    --kwargs '{"secret":"{{ deadman_password }}"}'
  args:
    chdir: /home/frappe/benches/deadman
  environment:
    PATH: "/home/frappe/.local/bin:{{ ansible_env.PATH }}"
