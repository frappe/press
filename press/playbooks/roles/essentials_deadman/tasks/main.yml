---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install prerequisite packages
  apt:
    state: present
    name:
      - software-properties-common
      - git
      - curl
      - wget
      - build-essential
      - pkg-config
      - mariadb-client
      - libmariadb-dev
      - libmariadb-dev-compat
      - ansible

- name: Check if Python 3.13 exists
  command: which python3.13
  register: python313_exists
  failed_when: false
  changed_when: false

- name: Add Deadsnakes PPA
  apt_repository:
    repo: ppa:deadsnakes/ppa
    state: present
  when: python313_exists.rc != 0

- name: Update apt cache after adding PPA
  apt:
    update_cache: yes
  when: python313_exists.rc != 0

- name: Install Python 3.13
  apt:
    state: present
    name:
      - python3.13
      - python3.13-dev
      - python3.13-venv
      - python3-pip

- name: Install NodeSource repository
  shell: curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
  args:
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js
  apt:
    name: nodejs
    state: present

- name: Install Yarn
  npm:
    name: yarn
    global: yes

- name: Install uv
  become: yes
  become_user: frappe
  shell: |
    python3.13 -m pip install --user --upgrade pip
    python3.13 -m pip install --user uv
  args:
    creates: /home/frappe/.local/bin/uv

- name: Install frappe-bench
  become: yes
  become_user: frappe
  shell: |
    python3.13 -m pip install --user frappe-bench
  args:
    creates: /home/frappe/.local/bin/bench

- name: Ensure ~/.local/bin is in PATH
  lineinfile:
    path: /home/frappe/.bashrc
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    create: yes

- name: Verify tooling
  become: yes
  become_user: frappe
  shell: |
    python3.13 --version
    node --version
    yarn --version
    /home/frappe/.local/bin/uv --version
    /home/frappe/.local/bin/bench --version
  changed_when: false
