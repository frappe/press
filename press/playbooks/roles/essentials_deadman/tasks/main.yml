---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install prerequisite packages
  apt:
    state: present
    name:
      - software-properties-common
      - git
      - curl
      - wget
      - build-essential
      - pkg-config
      - mariadb-client
      - libmariadb-dev
      - libmariadb-dev-compat
      - ansible

- name: Check if Python 3.14 exists
  command: which python3.14
  register: python314_exists
  failed_when: false
  changed_when: false

- name: Add Deadsnakes PPA
  apt_repository:
    repo: ppa:deadsnakes/ppa
    state: present
  when: python314_exists.rc != 0

- name: Update apt cache after adding PPA
  apt:
    update_cache: yes
  when: python314_exists.rc != 0

- name: Install Python 3.14
  apt:
    state: present
    name:
      - python3.14
      - python3.14-dev
      - python3.14-venv

- name: Install NodeSource repository
  shell: curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
  args:
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js
  apt:
    name: nodejs
    state: present

- name: Install Yarn
  npm:
    name: yarn
    global: yes

- name: Install uv
  become: yes
  become_user: frappe
  shell: |
    curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: /home/frappe/.local/bin/uv

- name: Install frappe-bench
  become: yes
  become_user: frappe
  shell: |
    /home/frappe/.local/bin/uv tool install frappe-bench
  args:
    creates: /home/frappe/.local/bin/bench

- name: Ensure ~/.local/bin is in PATH
  lineinfile:
    path: /home/frappe/.bashrc
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    create: yes

- name: Verify tooling
  become: yes
  become_user: frappe
  shell: |
    python3.14 --version
    node --version
    yarn --version
    /home/frappe/.local/bin/uv --version
    /home/frappe/.local/bin/bench --version
  changed_when: false
