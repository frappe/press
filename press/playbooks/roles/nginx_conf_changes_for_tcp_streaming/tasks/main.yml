---
- name: Check if stream block already exists in main config
  become: yes
  become_user: frappe
  shell: grep "^stream {" {{ nginx_conf_path }}
  register: stream_exists
  ignore_errors: yes

- name: Add stream block to main nginx.conf
  become: yes
  become_user: frappe
  lineinfile:
    path: "{{ nginx_conf_path }}"
    line: |

      stream {
          upstream secondary_80 {
              server {{ secondary_proxy }}:80;
          }
          upstream secondary_443 {
              server {{ secondary_proxy }}:443;
          }

          log_format proxy_stream '$remote_addr - [$time_local] $protocol "$ssl_preread_server_name"';
          access_log /var/log/nginx/stream_access.log proxy_stream;

          server {
              listen 80;
              proxy_pass secondary_80;
          }
          server {
              listen 443;
              proxy_pass secondary_443;
              ssl_preread on;
          }
      }
    insertafter: EOF
  when: stream_exists.rc != 0

- name: Comment out entire proxy.conf file
  become: yes
  become_user: frappe
  shell: |
    sed -i 's/^/# /' {{ proxy_conf_path }}

- name: Replace port 443 with 8443 in agent proxy conf
  become: yes
  become_user: frappe
  shell: |
    sed -i 's/\(^\|[[:space:]]\)443\b/\18443/g' {{ agent_conf_path }}

- name: Reload nginx
  service:
    name: nginx
    state: reloaded
