---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
  become: true

- name: Check if ufw-docker exists
  ansible.builtin.stat:
    path: /usr/local/bin/ufw-docker
  register: ufw_docker_stat

- name: Get UFW Docker
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/chaifeng/ufw-docker/2b419bbdde946a4fd1a8651940ad95b6b0b96dfa/ufw-docker
    dest: /usr/local/bin/ufw-docker
    mode: '0755'
  become: true
  when: not ufw_docker_stat.stat.exists

- name: Reset UFW
  ufw:
    state: reset
  become: true

- name: Allow traffic by default
  ufw:
    default: allow
  become: true

- name: Enable UFW
  ufw:
    state: enabled
  become: true

- name: Install UFW Docker
  ansible.builtin.command: ufw-docker install
  become: true

- name: Install UFW Docker service
  ansible.builtin.command: ufw-docker install-service --force
  become: true

- name: Add bypass rules
  ufw:
    rule: "{{ item.action | lower }}"
    from_ip: "{{ item.source | default('any') }}"
    to_ip: "{{ item.destination | default('any') }}"
    proto: "{{ item.protocol }}"
  loop: "{{ rules_bypass }}"

- name: Add user rules
  ufw:
    rule: "{{ item.action | lower }}"
    from_ip: "{{ item.source | default('any') }}"
    to_ip: "{{ item.destination | default('any') }}"
    proto: "{{ item.protocol | lower }}"
  loop: "{{ rules }}"
