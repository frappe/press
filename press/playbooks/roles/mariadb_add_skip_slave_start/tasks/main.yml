- name: Add skip-slave-start to MariaDB config
  ansible.builtin.lineinfile:
    path: /etc/mysql/conf.d/frappe.cnf
    insertafter: '^\[mysqld\]'
    line: 'skip-slave-start'
    state: present

- name: Restart MariaDB Service After Adding skip-slave-start
  systemd:
    daemon_reload: true
    name: mariadb
    # Servers provisioned from an already-current data disk snapshot skip the
    # MariaDB upgrade role (which would otherwise unmask the unit via apt), so
    # mariadb.service can still be masked here. Unmask before the first start.
    masked: false
    state: restarted
    enabled: yes
  when: restart_mariadb | default(true) | bool
