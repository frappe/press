---
- name: Stop DB Lsyncd Service
  systemd:
    name: on-prem-lsyncd-db
    state: stopped
    enabled: no
  ignore_errors: true

- name: Stop Wireguard on DB Server
  systemd:
    name: "wg-quick@wg0"
    state: stopped
    enabled: no
  ignore_errors: true

- name: Make sure to disable the wireguard interface
  command: "wg-quick down wg0"
  ignore_errors: true