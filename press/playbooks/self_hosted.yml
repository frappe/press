---
- name: Setup Self Hosted Server
  hosts: all
  become: yes
  become_user: root
  gather_facts: yes
  roles:
    - role: essentials
    - role: user
    - role: nginx
    - role: agent
    - role: setup_agent_auth
    - role: bench
    - role: docker
    - role: node_exporter
    - role: cadvisor
    - role: statsd_exporter
    - role: filebeat
    - role: gpg_config
    - role: user_ssh_certificate
