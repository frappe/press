---
- name: Setup Proxy Server
  hosts: all
  become: yes
  become_user: root
  gather_facts: yes
  roles:
    - role: essentials
    - role: user
    - role: nginx
    - role: agent
    - role: setup_agent_auth
    - role: proxy
    - role: node_exporter
    - role: user_ssh_certificate
    - role: filebeat
    - role: clamav
