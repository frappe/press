# This workflow,
# will get triggered once the release PR is merged to master.
# It will generate a new release using semantic release and push the changes to master. It will also create a new tag for the release.

name: Generate Semantic Release
on:
  workflow_dispatch:
  push:
    branches:
      - master
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for trusted publishing and npm provenance
    steps:
      - name: Checkout Entire Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          persist-credentials: false

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GIT_AUTHOR_NAME: "Frappe PR Bot"
          GIT_AUTHOR_EMAIL: "developers@frappe.io"
          GIT_COMMITTER_NAME: "Frappe PR Bot"
          GIT_COMMITTER_EMAIL: "developers@frappe.io"
        run: |
          npx \
            -p semantic-release \
            -p @semantic-release/commit-analyzer@13.0.1 \
            -p @semantic-release/release-notes-generator@14.1.0 \
            -p @semantic-release/github@12.0.6 \
            -p @semantic-release/exec@7.1.0 \
            -p @semantic-release/git \
            semantic-release
